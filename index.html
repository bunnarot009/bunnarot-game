<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมไก่วิ่งหลบสิ่งกีดขวาง (Chicken Run)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .score-board {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* พื้นหลังเกม */
        #gameArea {
            width: 600px;
            height: 250px;
            background-color: #f7f7f7;
            border-bottom: 4px solid #545454;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* ตัวละครไก่ (สร้างจาก CSS) */
        #chicken {
            width: 40px;
            height: 45px;
            position: absolute;
            bottom: 0;
            left: 50px;
            background-color: #f39c12; /* ตัวสีส้ม/เหลือง */
            border-radius: 50% 50% 40% 40%;
        }

        /* หงอนไก่ */
        #chicken::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 12px;
            width: 16px;
            height: 10px;
            background-color: #e74c3c; /* หงอนสีแดง */
            border-radius: 10px 10px 0 0;
        }

        /* ปากไก่ */
        #chicken::after {
            content: '';
            position: absolute;
            top: 10px;
            right: -6px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid #d35400; /* ปากสีส้มเข้ม */
        }

        .chicken-eye {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 6px;
            height: 6px;
            background-color: #000;
            border-radius: 50%;
        }

        /* แอนิเมชันกระโดด */
        .jump {
            animation: jumpAnim 0.5s linear;
        }

        @keyframes jumpAnim {
            0% { bottom: 0; }
            50% { bottom: 110px; }
            100% { bottom: 0; }
        }

        /* ต้นกระบองเพชร */
        .cactus {
            width: 25px;
            height: 45px;
            background-color: #27ae60;
            position: absolute;
            bottom: 0;
            right: -30px;
            border-radius: 5px 5px 0 0;
        }

        /* ข้อความจบเกม */
        #gameOverText {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        #gameOverText h2 {
            font-size: 2rem;
            color: #c0392b;
            margin-bottom: 10px;
        }

        #gameOverText p {
            background-color: #333;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Chicken Jump! 🐔</h1>
    <div class="score-board">คะแนน: <span id="score">0</span> | คะแนนสูงสุด: <span id="highScore">0</span></div>

    <div id="gameArea" onclick="triggerJump()">
        <div id="chicken">
            <div class="chicken-eye"></div>
        </div>
        
        <div id="cactus" class="cactus"></div>

        <div id="gameOverText">
            <h2>GAME OVER</h2>
            <p>กด Spacebar หรือแตะหน้าจอเพื่อเริ่มใหม่</p>
        </div>
    </div>

    <script>
        const chicken = document.getElementById('chicken');
        const cactus = document.getElementById('cactus');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const gameOverText = document.getElementById('gameOverText');

        let score = 0;
        let highScore = 0;
        let isJumping = false;
        let isGameOver = false;
        let gameSpeed = 5;
        let cactusPosition = 600;

        // ฟังก์ชันสั่งให้ไก่กระโดด
        function triggerJump() {
            if (isGameOver) {
                resetGame();
                return;
            }
            if (!isJumping) {
                isJumping = true;
                chicken.classList.add('jump');
                
                // เอา class jump ออกเมื่อกระโดดเสร็จ (500ms) เพื่อให้กดกระโดดใหม่ได้
                setTimeout(() => {
                    chicken.classList.remove('jump');
                    isJumping = false;
                }, 500);
            }
        }

        // ดักจับการกดปุ่ม Spacebar
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault(); // ป้องกันหน้าจอสกรอลลงล่าง
                triggerJump();
            }
        });

        // ลูปหลักของเกม (ใช้ควบคุมการเคลื่อนที่และการชน)
        function gameLoop() {
            if (!isGameOver) {
                // เคลื่อนที่กระบองเพชรไปทางซ้าย
                cactusPosition -= gameSpeed;
                
                // ถ้ากระบองเพชรหลุดหน้าจอ ให้ไปเริ่มใหม่ทางขวา
                if (cactusPosition < -30) {
                    cactusPosition = 600;
                    score++;
                    scoreDisplay.innerText = score;
                    
                    // ทุกๆ 5 คะแนน เกมจะเร็วขึ้นเล็กน้อยเพิ่มความท้าทาย
                    if (score % 5 === 0) {
                        gameSpeed += 0.5;
                    }
                }
                cactus.style.left = cactusPosition + 'px';

                // ตรวจสอบการชน (Collision Detection)
                let chickenBottom = parseInt(window.getComputedStyle(chicken).getPropertyValue('bottom'));
                
                // ระยะที่ไก่และกระบองเพชรจะชนกัน
                if (cactusPosition > 50 && cactusPosition < 90 && chickenBottom < 45) {
                    endGame();
                }
            }
            requestAnimationFrame(gameLoop);
        }

        // ฟังก์ชันเมื่อจบเกม
        function endGame() {
            isGameOver = true;
            gameOverText.style.display = 'block';
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.innerText = highScore;
            }
        }
