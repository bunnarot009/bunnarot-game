<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องคิดเลข Web App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .calculator {
            background-color: #1e1e24;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        .display {
            width: 100%;
            height: 80px;
            background-color: #2a2a35;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 2.5rem;
            text-align: right;
            padding: 10px;
            pointer-events: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 20px;
            font-size: 1.5rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background-color: #3a3a4a;
            color: #ffffff;
            transition: background-color 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        /* ตกแต่งสีปุ่มพิเศษ */
        button.operator {
            background-color: #ff9f0a;
            color: white;
        }

        button.clear {
            background-color: #ff3b30;
            color: white;
        }

        button.equal {
            background-color: #34c759;
            color: white;
            grid-column: span 2; /* ให้ปุ่มเครื่องหมายเท่ากับยาว 2 ช่อง */
        }

        button:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="display" id="result" readonly value="0">
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendValue('/')" class="operator">÷</button>
            <button onclick="appendValue('*')" class="operator">×</button>
            <button onclick="appendValue('-')" class="operator">-</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('+')" class="operator">+</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('.')">.</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            
            <button onclick="appendValue('0')">0</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('result');

        // ฟังก์ชันสำหรับเพิ่มตัวเลขหรือเครื่องหมายบนหน้าจอ
        function appendValue(value) {
            if (display.value === '0' && !isNaN(value)) {
                display.value = value; // ถ้าหน้าจอเป็น 0 ให้พิมพ์ทับตัวแรกลงไปเลย
            } else {
                display.value += value;
            }
        }

        // ฟังก์ชันล้างหน้าจอ (ปุ่ม C)
        function clearDisplay() {
            display.value = '0';
        }

        // ฟังก์ชันคำนวณผลลัพธ์ (ปุ่ม =)
        function calculate() {
            try {
                // ใช้ eval ในการคำนวณสมการคณิตศาสตร์จากข้อความ
                display.value = eval(display.value);
            } catch (error) {
                display.value = 'Error'; // ถ้ากรอกสมการผิดพลาดให้ขึ้น Error
            }
        }
    </script>
